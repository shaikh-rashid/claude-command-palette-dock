<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body>
  <div class="panel">
    <div class="search">
      <span class="mag"></span><span class="typed">claude</span><span class="caret"></span>
      <span class="cue">PowerToys Command Palette</span>
    </div>
    <div class="dock">
      <div class="tile focus">
        <svg class="mark" width="30" height="30" viewBox="0 0 40 40">
          <g stroke="#D97757" stroke-width="3.4" stroke-linecap="round">
            <line x1="20" y1="4" x2="20" y2="14"/><line x1="20" y1="26" x2="20" y2="36"/>
            <line x1="4" y1="20" x2="14" y2="20"/><line x1="26" y1="20" x2="36" y2="20"/>
            <line x1="8.7" y1="8.7" x2="15.8" y2="15.8"/><line x1="24.2" y1="24.2" x2="31.3" y2="31.3"/>
            <line x1="31.3" y1="8.7" x2="24.2" y2="15.8"/><line x1="15.8" y1="24.2" x2="8.7" y2="31.3"/>
          </g><circle cx="20" cy="20" r="4.6" fill="#D97757"/>
        </svg>
        <div>
          <div class="tt">62% session left</div>
          <div class="ts">78% week · resets 2:00 PM</div>
        </div>
      </div>
      <div class="tile"><span class="dot"></span><div><div class="tt" style="font-size:14px">Clipboard</div><div class="ts">3 items</div></div></div>
      <div class="tile"><span class="dot"></span><div><div class="tt" style="font-size:14px">Timers</div><div class="ts">None running</div></div></div>
    </div>
    <div class="rows">
      <div class="li sel">
        <svg class="mark" width="20" height="20" viewBox="0 0 40 40">
          <g stroke="#D97757" stroke-width="3.4" stroke-linecap="round">
            <line x1="20" y1="4" x2="20" y2="14"/><line x1="20" y1="26" x2="20" y2="36"/>
            <line x1="4" y1="20" x2="14" y2="20"/><line x1="26" y1="20" x2="36" y2="20"/>
            <line x1="8.7" y1="8.7" x2="15.8" y2="15.8"/><line x1="24.2" y1="24.2" x2="31.3" y2="31.3"/>
            <line x1="31.3" y1="8.7" x2="24.2" y2="15.8"/><line x1="15.8" y1="24.2" x2="8.7" y2="31.3"/>
          </g><circle cx="20" cy="20" r="4.6" fill="#D97757"/>
        </svg>
        <div>Claude Usage Dock</div><span class="ls">Session, weekly, and per-model limits</span>
      </div>
      <div class="li"><span class="dot"></span><div>Claude Usage Dock — Work</div><span class="ls">Second account</span></div>
    </div>
    <div class="foot"><span>↵ Open</span><span>Ctrl+R Refresh</span><span>Ctrl+K Actions</span></div>
  </div>
</body></html>
