<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body>
  <div class="panel">
    <div class="search">
      <span class="mag"></span><span class="typed">Claude Usage Dock</span>
      <span class="cue">Enter Refresh · Ctrl+K Actions</span>
    </div>
    <div class="content">
      <div class="h1">Claude usage</div>
      <div class="plan">Plan: <b>Pro</b> · last checked 2:14 PM</div>
      <div class="tabs">
        <span class="tab">Usage</span><span class="tab">Breakdown</span><span class="tab active">Heatmap</span>
      </div>

      <div class="section-title">Past month</div>
      <div class="heatpanel">
        <div class="heatgrid">
          <!-- header -->
          <div></div>
          <div class="hcol">M</div><div class="hcol">T</div><div class="hcol">W</div><div class="hcol">T</div><div class="hcol">F</div><div class="hcol">S</div><div class="hcol">S</div>
          <div></div><div class="hcol">WK</div>
          <!-- week 1 -->
          <div class="hrow-label">JUN</div>
          <div class="cell r2"></div><div class="cell r3"></div><div class="cell r2"></div><div class="cell r4"></div><div class="cell r1"></div><div class="cell r0"></div><div class="cell r1"></div>
          <div></div><div class="wk">31%</div>
          <!-- week 2 -->
          <div class="hrow-label"></div>
          <div class="cell r1"></div><div class="cell r2"></div><div class="cell r3"></div><div class="cell r2"></div><div class="cell r3"></div><div class="cell r1"></div><div class="cell r0"></div>
          <div></div><div class="wk">28%</div>
          <!-- week 3 -->
          <div class="hrow-label"></div>
          <div class="cell r3"></div><div class="cell r4"></div><div class="cell r2"></div><div class="cell r1"></div><div class="cell r2"></div><div class="cell r0"></div><div class="cell r1"></div>
          <div></div><div class="wk">34%</div>
          <!-- week 4 -->
          <div class="hrow-label">JUL</div>
          <div class="cell r2"></div><div class="cell r1"></div><div class="cell r3"></div><div class="cell r4"></div><div class="cell r3"></div><div class="cell r1"></div><div class="cell r0"></div>
          <div></div><div class="wk">33%</div>
          <!-- week 5 -->
          <div class="hrow-label"></div>
          <div class="cell r1"></div><div class="cell r2"></div><div class="cell r2"></div><div class="cell r3"></div><div class="cell r0"></div><div class="cell r0"></div><div class="cell r0"></div>
          <div></div><div class="wk">19%</div>
        </div>
        <div class="legend">
          LESS <span class="sw r0"></span><span class="sw r1"></span><span class="sw r2"></span><span class="sw r3"></span><span class="sw r4"></span> MORE
        </div>
      </div>
      <div class="cap">usage over the past month</div>
      <div class="cap" style="margin-top:4px">month ≈ 145% of one week's quota</div>
    </div>
  </div>
</body></html>
