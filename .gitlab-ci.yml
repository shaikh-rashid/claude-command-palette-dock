# Two pipelines in one file:
#
#   - Security checks (test stage) on default-branch pushes and merge requests,
#     mirroring .github/workflows/security.yml: GitLab's built-in Secret
#     Detection (gitleaks under the hood, full-history scan) plus a NuGet
#     vulnerability audit.
#
#   - Signed release publishing on vX.Y.Z tags, mirroring
#     .github/workflows/release.yml.
#
# GitLab Releases can't have files attached directly the way GitHub Releases
# can — files first go to the project's generic package registry, then the
# Release references them by URL. That's why this is two jobs instead of one:
# `build_and_sign` needs a Windows runner (makeappx.exe/signtool.exe, and a
# windows10.0.26100.0 dotnet publish target); `create_release` just talks to
# the GitLab API and runs fine on the default Linux shared runner.
#
# One-time setup before the first tag push:
#   1. Run scripts/generate-release-cert.ps1 locally.
#   2. Add its two printed values as CI/CD variables (Settings -> CI/CD ->
#      Variables): RELEASE_PFX_BASE64 and RELEASE_PFX_PASSWORD. Mark both
#      "Masked" (and "Protected" if release tags are protected).
#
# Uses GitLab.com's shared Windows runner pool (tag: saas-windows-medium-amd64).
# If your plan doesn't include Windows runner minutes, or you're on a
# self-hosted instance, replace that tag with your own Windows runner's tag.

stages:
  - test
  - build
  - release

workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Secret Detection is available on every GitLab tier. It defines the
# `secret_detection` job (test stage), which runs on branch/MR pipelines and
# skips tag pipelines on its own. The historic flag scans the whole history,
# not just the pushed range — this repo is small, so it stays fast.
include:
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_HISTORIC_SCAN: "true"

# Same audit as the GitHub workflow. Restoring a net9.0-windows-TFM project on a
# non-Windows SDK needs EnableWindowsTargeting=true (NETSDK1100 otherwise) — it
# lets restore/list resolve the Windows targeting pack from NuGet without
# actually requiring a Windows build. `dotnet list package` doesn't accept -p:
# MSBuild property overrides, so this is set as an env var instead — MSBuild
# reads an environment variable as the property's value when nothing else sets
# it, and that works for both dotnet subcommands. Verified locally in the same
# mcr.microsoft.com/dotnet/sdk:9.0 image CI uses.
dependency_audit:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:9.0
  tags:
    - saas-linux-small-amd64
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    EnableWindowsTargeting: "true"
  script:
    - dotnet restore ClaudeUsageDock/ClaudeUsageDock.csproj
    - |
      output=$(dotnet list ClaudeUsageDock/ClaudeUsageDock.csproj package --vulnerable --include-transitive)
      echo "$output"
      if echo "$output" | grep -q "has the following vulnerable packages"; then
        echo "Vulnerable NuGet packages found — update them (see output above)." >&2
        exit 1
      fi

# Shared setup for the two Windows signing jobs — the real tagged release
# (build_and_sign) and the manual dry run (verify_signing). Both run the same
# signing code (scripts/ci-build-release.ps1), so a green dry run on the default
# branch means a tag build will sign too. That lets the signing be iterated
# without spending a version tag each attempt — protected release tags can't be
# moved or deleted via git, so every tagged try otherwise burns a version.
.windows_release_base:
  stage: build
  tags:
    - saas-windows-medium-amd64
  before_script:
    - |
      $ErrorActionPreference = "Stop"

      # Fail fast if the one-time-setup CI/CD variables aren't reaching the job.
      # An empty value means they were never added (Settings -> CI/CD ->
      # Variables, see the header of this file), or they're marked Protected
      # while the ref isn't protected — GitLab silently withholds Protected
      # variables from unprotected refs. Both the release tags and the default
      # branch must be protected for their pipelines to see them (the default
      # branch is protected by default; protect v* tags under Settings ->
      # Repository -> Protected tags).
      foreach ($name in "RELEASE_PFX_BASE64", "RELEASE_PFX_PASSWORD") {
        if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
          throw "CI/CD variable $name is empty or unset in this job. Add it under Settings -> CI/CD -> Variables, and make sure this ref is protected so a Protected variable reaches it."
        }
      }

      # Install the .NET SDK pinned in global.json — GitLab's shared Windows
      # runners don't reliably ship a matching preinstalled version.
      Invoke-WebRequest -Uri "https://dot.net/v1/dotnet-install.ps1" -OutFile "$env:CI_PROJECT_DIR\dotnet-install.ps1"
      & "$env:CI_PROJECT_DIR\dotnet-install.ps1" -JsonFile global.json -InstallDir "$env:CI_PROJECT_DIR\.dotnet"
      $env:PATH = "$env:CI_PROJECT_DIR\.dotnet;$env:PATH"

      $bytes = [Convert]::FromBase64String($env:RELEASE_PFX_BASE64)
      [IO.File]::WriteAllBytes((Join-Path $env:CI_PROJECT_DIR "release.pfx"), $bytes)

build_and_sign:
  extends: .windows_release_base
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  variables:
    PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/release-assets/${CI_COMMIT_TAG}"
  script:
    - |
      $ErrorActionPreference = "Stop"

      $version = $env:CI_COMMIT_TAG.TrimStart('v')
      $fileVersion = (Get-Content VERSION -Raw).Trim()
      if ($version -ne $fileVersion) {
        throw "Tag $env:CI_COMMIT_TAG (version $version) does not match the VERSION file ($fileVersion). Bump VERSION and Package.appxmanifest before tagging a release."
      }

      $pfxPath = Join-Path $env:CI_PROJECT_DIR "release.pfx"
      .\scripts\ci-build-release.ps1 -PfxPath $pfxPath -PfxPassword $env:RELEASE_PFX_PASSWORD -OutputDir release-output
      Remove-Item $pfxPath -Force

      # Changelog section for this version becomes the release description.
      $lines = Get-Content CHANGELOG.md
      $startMatch = $lines | Select-String -Pattern "^## \[$([regex]::Escape($version))\]" | Select-Object -First 1
      if (-not $startMatch) { throw "No CHANGELOG.md section found for version $version — add one before releasing." }
      $rest = $lines[$startMatch.LineNumber..($lines.Count - 1)]
      $nextHeading = $rest | Select-String -Pattern "^## \[" | Select-Object -First 1
      $section = if ($nextHeading) { $rest[0..($nextHeading.LineNumber - 2)] } else { $rest }
      $section -join "`n" | Out-File -FilePath release-notes.md -Encoding utf8

      # Upload both artifacts to the generic package registry so the release
      # job (a different runner) can link to them.
      $headers = @{ "JOB-TOKEN" = $env:CI_JOB_TOKEN }
      Invoke-WebRequest -Uri "$env:PACKAGE_REGISTRY_URL/ClaudeUsageDock.msix" -Method Put -Headers $headers -InFile "release-output\ClaudeUsageDock.msix"
      Invoke-WebRequest -Uri "$env:PACKAGE_REGISTRY_URL/ClaudeUsageDock-Release.cer" -Method Put -Headers $headers -InFile "release-output\ClaudeUsageDock-Release.cer"
  artifacts:
    paths:
      - release-output/
      - release-notes.md
    expire_in: 1 week

# On-demand dry run of the exact build+sign path, without a tag, upload, or
# release. Trigger it by hand from a default-branch pipeline (Pipelines -> the
# latest main pipeline -> play the "verify_signing" job) to confirm the MSIX
# signs on the runner before spending a release tag. allow_failure keeps a red
# dry run from failing the branch pipeline.
verify_signing:
  extends: .windows_release_base
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true
  script:
    - |
      $ErrorActionPreference = "Stop"
      $pfxPath = Join-Path $env:CI_PROJECT_DIR "release.pfx"
      .\scripts\ci-build-release.ps1 -PfxPath $pfxPath -PfxPassword $env:RELEASE_PFX_PASSWORD -OutputDir release-output
      Remove-Item $pfxPath -Force
      Write-Host "Signing dry run succeeded — release-output\ClaudeUsageDock.msix is signed. Safe to tag this commit for release."
  artifacts:
    paths:
      - release-output/
    expire_in: 1 day

create_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  tags:
    - saas-linux-small-amd64
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  needs:
    - job: build_and_sign
      artifacts: true
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "ClaudeUsageDock $CI_COMMIT_TAG"
    description: release-notes.md
    assets:
      links:
        - name: "ClaudeUsageDock.msix"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/release-assets/${CI_COMMIT_TAG}/ClaudeUsageDock.msix"
        - name: "ClaudeUsageDock-Release.cer"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/release-assets/${CI_COMMIT_TAG}/ClaudeUsageDock-Release.cer"
